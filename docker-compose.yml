services:

  # ================================
  # MYSQL
  # ================================
  mysql:
    image: mysql:8
    container_name: mysql-container
    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: transaction_db

    ports:
      - "3307:3306"

    volumes:
      - mysql_data:/var/lib/mysql


  # ================================
  # REDIS
  # ================================
  redis:
    image: redis:7
    container_name: redis-container
    restart: always

    ports:
      - "6379:6379"


  # ================================
  # API SERVICE
  # ================================
  api-service:
    build:
      context: ./api-service

    container_name: api-service-container

    restart: always

    ports:
      - "8000:8000"

    env_file:
      - .env

    depends_on:
      - mysql
      - redis

    volumes:
      - uploads_data:/app/uploads


  # ================================
  # AI REPORT SERVICE
  # ================================
  ai-report-service:
    build:
      context: ./ai-report-service

    container_name: ai-report-service-container

    restart: always

    ports:
      - "8001:8001"

    env_file:
      - .env

    depends_on:
      - redis

    volumes:
      - uploads_data:/app/uploads


